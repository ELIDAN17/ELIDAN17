name: Actualizar Lenguajes Perfil

on:
  schedule:
    # Se ejecuta automáticamente todos los días a la medianoche
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite activarlo manualmente cuando quieras

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_TITLE: false
          SECTION_NAME: waka
